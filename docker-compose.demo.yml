version: "3.9"

# Demo compose — uses OSRM demo server (router.project-osrm.org) for real road routing.
# Usage: docker-compose -f docker-compose.demo.yml up --build

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - USE_MOCK_OSRM=false
      - OSRM_BASE_URL=https://router.project-osrm.org
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - REQUEST_TIMEOUT=15.0
      - ALLOWED_ORIGINS=*
    depends_on:
      - redis
    restart: always
    networks:
      - routing-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - routing-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - routing-net

networks:
  routing-net:
    driver: bridge
